<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eab308" />
    </marker>
    <marker id="arrowSecondary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg)" rx="16" />
  
  <!-- Title -->
  <text x="500" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Smart Meme Parser v2.0 - Algorithm Architecture</text>
  <text x="500" y="80" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Time Window: Last 1 Hour | Execution: Every 30 Min</text>

  <!-- LEFT COLUMN: Meme Parsing Pipeline -->
  <rect x="50" y="120" width="400" height="530" fill="#1e293b" rx="12" stroke="#334155" stroke-width="2" />
  <text x="250" y="150" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Main Parsing Pipeline</text>

  <!-- Box 1: Input -->
  <rect x="100" y="180" width="300" height="50" fill="url(#primary)" rx="8" filter="url(#glow)"/>
  <text x="250" y="210" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">config.json (Active Sources)</text>

  <!-- Arrow -->
  <path d="M 250 230 L 250 260" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 2: Filter -->
  <rect x="100" y="260" width="300" height="70" fill="#334155" rx="8" />
  <text x="250" y="285" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Data Filtering</text>
  <text x="250" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Exclude: text-only, fwdFrom, roundMessage</text>

  <!-- Arrow -->
  <path d="M 250 330 L 250 360" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 3: Virality & EMA -->
  <rect x="100" y="360" width="300" height="80" fill="#334155" rx="8" />
  <text x="250" y="385" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Historical Memory (EMA)</text>
  <text x="250" y="405" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Calculate VI (Virality Index)</text>
  <text x="250" y="425" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">New Baseline = 80% History + 20% Current</text>

  <!-- DB Icon left of EMA -->
  <rect x="30" y="375" width="50" height="50" fill="#0f172a" rx="8" stroke="#64748b" />
  <text x="55" y="405" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">EMA.json</text>
  <path d="M 80 400 L 100 400" stroke="#64748b" stroke-width="2" stroke-dasharray="4" />

  <!-- Arrow -->
  <path d="M 250 440 L 250 470" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 4: Anomaly Check -->
  <rect x="100" y="470" width="300" height="50" fill="#b45309" rx="8" />
  <text x="250" y="500" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Anomaly > 15x Threshold?</text>

  <!-- Arrow -->
  <path d="M 250 520 L 250 550" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 5: Post -->
  <rect x="100" y="550" width="300" height="60" fill="url(#success)" rx="8" filter="url(#glow)"/>
  <text x="250" y="575" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Forward Meme to Target</text>
  <text x="250" y="595" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">Check DB for duplicates -> Send</text>

  <!-- RIGHT COLUMN: Discovery Pipeline -->
  <rect x="550" y="120" width="400" height="530" fill="#1e293b" rx="12" stroke="#334155" stroke-width="2" />
  <text x="750" y="150" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Discovery Ecosystem</text>

  <!-- Connection from Left Filter to Right -->
  <path d="M 400 310 L 520 310" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="6" marker-end="url(#arrowSecondary)" />
  <text x="460" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">fwdFrom Detected</text>

  <!-- Box 1: Extract Fwd -->
  <rect x="600" y="280" width="300" height="60" fill="url(#secondary)" rx="8" filter="url(#glow)"/>
  <text x="750" y="305" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Extract Repost Channel</text>
  <text x="750" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#ede9fe" text-anchor="middle">Check Ignored List (Blacklist)</text>

  <!-- Arrow -->
  <path d="M 750 340 L 750 370" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 2: Get Subs -->
  <rect x="600" y="370" width="300" height="70" fill="#334155" rx="8" />
  <text x="750" y="395" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Subs Cache Validation</text>
  <text x="750" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">If Subs <= 10,000 → Accept</text>

  <!-- DB Icon right of Subs Cache -->
  <rect x="920" y="380" width="50" height="50" fill="#0f172a" rx="8" stroke="#64748b" />
  <text x="945" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Cache.json</text>
  <path d="M 900 405 L 920 405" stroke="#64748b" stroke-width="2" stroke-dasharray="4" />

  <!-- Arrow -->
  <path d="M 750 440 L 750 470" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Box 3: Save Discovered -->
  <rect x="600" y="470" width="300" height="50" fill="#334155" rx="8" />
  <text x="750" y="500" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Save to discovered_channels.json</text>

  <!-- Arrow -->
  <path d="M 750 520 L 750 550" stroke="#eab308" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrowPrimary)" />

  <!-- Box 4: UI -->
  <rect x="600" y="550" width="300" height="60" fill="url(#primary)" rx="8" filter="url(#glow)"/>
  <text x="750" y="575" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">Admin Dashboard</text>
  <text x="750" y="595" font-family="system-ui, sans-serif" font-size="12" fill="#111827" text-anchor="middle">Group by Reposts | 1-Click Promote</text>

  <!-- Loop back to config -->
  <path d="M 750 610 L 750 640 L 250 640 L 250 610" stroke="#eab308" stroke-width="3" stroke-dasharray="6" fill="none" marker-end="url(#arrowPrimary)" />
  <text x="500" y="630" font-family="system-ui, sans-serif" font-size="12" fill="#fef08a" text-anchor="middle">User Promotes to Active</text>

</svg>
